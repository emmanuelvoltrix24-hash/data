<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFL Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1923; color: #e0e6ed; padding: 20px; }
h1 { font-size: 1.5em; margin-bottom: 16px; color: #00e5ff; }
h2 { font-size: 1.1em; margin: 0 0 10px 0; color: #8899aa; }

.source-section { margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid #2a3d4d; }
.source-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
.source-header:hover { filter: brightness(1.1); }
.source-header .arrow { transition: transform .2s; font-size: 0.8em; color: #667788; }
.source-header.collapsed .arrow { transform: rotate(-90deg); }
.source-body { }
.source-body.hidden { display: none; }

.source-betkraft .source-header { background: #00e5ff15; }
.source-bongobongo .source-header { background: #00c85315; }
.source-bangbet .source-header { background: #ff6d0015; }
.source-betpawa .source-header { background: #d500f915; }

.source-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
.source-dot.betkraft { background: #00e5ff; }
.source-dot.bongobongo { background: #00c853; }
.source-dot.bangbet { background: #ff6d00; }
.source-dot.betpawa { background: #d500f9; }

.source-name { font-weight: 600; font-size: 1em; }
.source-meta { font-size: 0.8em; color: #667788; margin-left: auto; }

table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
th { text-align: left; padding: 8px 10px; border-bottom: 2px solid #2a3d4d; color: #8899aa; font-weight: 600; white-space: nowrap; }
td { padding: 7px 10px; border-bottom: 1px solid #1a2d3d; white-space: nowrap; }
tr:hover { background: #1a2d3d; }
.source-table-wrap { overflow-x: auto; padding: 0; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75em; font-weight: 600; }
.badge-HIGH { background: #00c85320; color: #00c853; border: 1px solid #00c85340; }
.badge-MEDIUM { background: #ffd60020; color: #ffd600; border: 1px solid #ffd60040; }
.badge-LOW { background: #ff6d0020; color: #ff6d00; border: 1px solid #ff6d0040; }
.badge-true,.badge-correct { background: #00c85320; color: #00c853; border: 1px solid #00c85340; }
.badge-false,.badge-wrong { background: #ff174420; color: #ff1744; border: 1px solid #ff174440; }
.badge-parity { background: #2979ff20; color: #2979ff; border: 1px solid #2979ff40; }
.badge-cs { background: #00c85320; color: #00c853; border: 1px solid #00c85340; }
.badge-ht_parity { background: #ff6d0020; color: #ff6d00; border: 1px solid #ff6d0040; }
.badge-ht_outcome { background: #d500f920; color: #d500f9; border: 1px solid #d500f940; }
.badge-total_parity { background: #00e5ff20; color: #00e5ff; border: 1px solid #00e5ff40; }
.badge-both_score { background: #76ff0320; color: #76ff03; border: 1px solid #76ff0340; }
.badge-both_late { background: #ffea0020; color: #ffea00; border: 1px solid #ffea0040; }
.badge-outcome { background: #ff174420; color: #ff1744; border: 1px solid #ff174440; }
.badge-odds_fav { background: #e040fb20; color: #e040fb; border: 1px solid #e040fb40; }
.badge-any_late { background: #00bcd420; color: #00bcd4; border: 1px solid #00bcd440; }
.badge-ht_cs { background: #8bc34a20; color: #8bc34a; border: 1px solid #8bc34a40; }
.badge-gg_yes { background: #ff572220; color: #ff5722; border: 1px solid #ff572240; }
.badge-tg25_o { background: #79554820; color: #795548; border: 1px solid #79554840; }
.badge-gg_scored { background: #ff572220; color: #ff5722; border: 1px solid #ff572240; }
.badge-tg25_scored { background: #79554820; color: #795548; border: 1px solid #79554840; }
.badge-tg45_scored { background: #607d8b20; color: #607d8b; border: 1px solid #607d8b40; }
.badge-cs_home { background: #00c85320; color: #00c853; border: 1px solid #00c85340; }
.badge-cs_away { background: #ff174420; color: #ff1744; border: 1px solid #ff174440; }
.badge-dc_home { background: #2979ff20; color: #2979ff; border: 1px solid #2979ff40; }
.badge-dc_away { background: #d500f920; color: #d500f9; border: 1px solid #d500f940; }
.badge-margin_group { background: #76ff0320; color: #76ff03; border: 1px solid #76ff0340; }
.badge-score_band { background: #e040fb20; color: #e040fb; border: 1px solid #e040fb40; }

/* Mobile collapse defaults */
.source-body.hidden { display: none; }

/* Responsive */
@media (max-width: 600px) {
  body { padding: 10px; font-size: 14px; }
  h1 { font-size: 1.2em; }
  table { font-size: 0.7em; }
  th, td { padding: 4px 5px; }
  .grid { grid-template-columns: 1fr 1fr; gap: 6px; }
  .card { padding: 10px; }
  .card .value { font-size: 1.3em; }
  .search-input { width: 100%; }
  .nav { gap: 6px; }
  .nav a { padding: 6px 10px; font-size: 0.75em; }
  .source-header { padding: 10px 12px; }
  .source-meta { font-size: 0.65em; }
  .badge { padding: 1px 5px; font-size: 0.65em; }
}

.nav { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.nav a { color: #e0e6ed; text-decoration: none; padding: 8px 18px; border-radius: 6px; border: 1px solid #2a3d4d; cursor: pointer; font-size: 0.9em; }
.nav a:hover { background: #2a3d4d; }
.nav a.active { background: #00e5ff20; border-color: #00e5ff; color: #00e5ff; }

.page { display: none; }
.page.active { display: block; }

.flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
.conf-btn { padding: 4px 12px; border-radius: 4px; border: 1px solid #2a3d4d; background: transparent; color: #e0e6ed; cursor: pointer; font-size: 0.8em; }
.conf-btn.active { background: #00e5ff20; border-color: #00e5ff; color: #00e5ff; }
.search-input { background: #1a2d3d; border: 1px solid #2a3d4d; color: #e0e6ed; padding: 6px 12px; border-radius: 4px; font-size: 0.85em; width: 200px; }
.search-input:focus { outline: none; border-color: #00e5ff; }

.empty { text-align: center; padding: 20px; color: #667788; font-size: 0.85em; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 16px; }
.card { background: #1a2d3d; border-radius: 6px; padding: 14px; border: 1px solid #2a3d4d; }
.card h3 { font-size: 0.8em; color: #8899aa; margin-bottom: 4px; }
.card .value { font-size: 1.6em; font-weight: bold; }
.card .sub { font-size: 0.75em; color: #667788; margin-top: 2px; }
</style>
</head>
<body>

<h1>⚽ VFL Prediction Dashboard</h1>

<div class="nav">
  <a class="active" data-page="predictions">📊 Predictions</a>
  <a data-page="audit">🎯 Audit</a>
  <a data-page="sources">📡 Sources</a>
  <a data-page="rules">📏 Rules</a>
</div>

<!-- PREDICTIONS -->
<div id="page-predictions" class="page active">
  <div class="flex-row">
    <div class="conf-btn active" data-conf="all">All</div>
    <div class="conf-btn" data-conf="HIGH">HIGH</div>
    <div class="conf-btn" data-conf="MEDIUM">MEDIUM</div>
    <div class="conf-btn" data-conf="LOW">LOW</div>
    <select id="market-filter" class="search-input" style="width:auto" onchange="loadPredictions()">
      <option value="all">All Markets</option>
      <option value="parity">Parity</option>
      <option value="cs">CS</option>
      <option value="ht_parity">HT Parity</option>
      <option value="ht_outcome">HT Outcome</option>
      <option value="total_parity">Total Parity</option>
      <option value="both_score">Both Score</option>
      <option value="outcome">Outcome</option>
      <option value="gg_scored">GG</option>
      <option value="tg25_scored">O2.5</option>
      <option value="tg45_scored">O4.5</option>
      <option value="cs_home">CS Home</option>
      <option value="cs_away">CS Away</option>
      <option value="dc_home">DC Home</option>
      <option value="dc_away">DC Away</option>
      <option value="margin_group">Margin</option>
      <option value="score_band">Score Band</option>
    </select>
    <input class="search-input" id="pred-search" placeholder="Search slot/target/source..." oninput="loadPredictions()">
    <span id="pred-count" style="color:#667788;font-size:0.8em"></span>
  </div>
  <div id="predictions-container"></div>
</div>

<!-- AUDIT -->
<div id="page-audit" class="page">
  <div class="grid" id="audit-stats"></div>
  <h2>Best Markets Per Source</h2>
  <div id="audit-best-markets"></div>
  <h2>Slot Accuracy</h2>
  <div id="audit-slots"></div>
  <h2>Recent Audit Log</h2>
  <div id="audit-log"></div>
</div>

<!-- SOURCES -->
<div id="page-sources" class="page">
  <div class="grid" id="sources-grid"></div>
  <div id="sources-storage"></div>
  <h2>Recent Rounds</h2>
  <div id="rounds-by-source"></div>
</div>

<!-- RULES -->
<div id="page-rules" class="page">
  <div class="flex-row">
    <input class="search-input" id="rules-search" placeholder="Search target..." oninput="loadRules()">
    <span id="rules-count" style="color:#667788;font-size:0.8em"></span>
  </div>
  <div id="rules-container"></div>
</div>

<script>
const API = window.location.origin;
let activeConf = 'all';
let predTimer, auditTimer, sourcesTimer, rulesTimer;

async function api(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return { error: r.status };
    return await r.json();
  } catch(e) { return { error: e.message }; }
}

function dot(src) { return `<span class="source-dot ${src}"></span>`; }
function cell(v) { return `<td>${v ?? '-'}</td>`; }
function pct(v) { return (v * 100).toFixed(1) + '%'; }

function toggleSource(el) {
  const header = el.closest('.source-header');
  header.classList.toggle('collapsed');
  const section = header.closest('.source-section');
  const body = section ? section.querySelector('.source-body') : null;
  if (body) body.classList.toggle('hidden');
}

function badge(label, count) {
  const c = count ? '' : '';
  return `<span class="badge badge-${label}">${label}${count ? ' ' + count : ''}</span>`;
}

// ── Tab switching ──
document.querySelectorAll('.nav a').forEach(a => {
  a.addEventListener('click', function() {
    document.querySelectorAll('.nav a').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const page = document.getElementById('page-' + this.dataset.page);
    if (page) page.classList.add('active');
    
    // Clear intervals and load correct tab
    clearInterval(predTimer); clearInterval(auditTimer);
    clearInterval(sourcesTimer); clearInterval(rulesTimer);
    
    if (this.dataset.page === 'predictions') { loadPredictions(); predTimer = setInterval(loadPredictions, 10000); }
    else if (this.dataset.page === 'audit') { loadAudit(); auditTimer = setInterval(loadAudit, 15000); }
    else if (this.dataset.page === 'sources') { loadSources(); sourcesTimer = setInterval(loadSources, 30000); }
    else if (this.dataset.page === 'rules') { loadRules(); rulesTimer = setInterval(loadRules, 20000); }
  });
});

// ── Confidence filter ──
document.querySelectorAll('.conf-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.conf-btn').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
    activeConf = this.dataset.conf;
    loadPredictions();
  });
});

// ── Predictions ──
async function loadPredictions() {
  const d = await api(API + '/api/predictions');
  if (d.error) return;
  const search = (document.getElementById('pred-search').value || '').toLowerCase();
  const marketFilter = document.getElementById('market-filter').value;
  let list = d.predictions || [];
  if (activeConf !== 'all') list = list.filter(p => p.confidence === activeConf);
  if (marketFilter !== 'all') list = list.filter(p => p.pred_type === marketFilter);
  if (search) list = list.filter(p => (p.slot||'').toLowerCase().includes(search) || (p.target||'').toLowerCase().includes(search) || (p.source||'').includes(search) || (p.pred_type||'').includes(search));
  
  document.getElementById('pred-count').textContent = list.length + ' predictions';

  const groups = {};
  list.forEach(p => {
    if (!groups[p.source]) groups[p.source] = [];
    groups[p.source].push(p);
  });

  const order = ['betkraft', 'bongobongo', 'bangbet', 'betpawa'];
  let html = '';
  order.forEach(src => {
    const items = groups[src] || [];
    if (!items.length) return;
    const hi = items.filter(p => p.confidence === 'HIGH').length;
    const med = items.filter(p => p.confidence === 'MEDIUM').length;
    const types = {};
    items.forEach(p => { const t = p.pred_type || '?'; types[t] = (types[t] || 0) + 1; });
    const typeSummary = Object.entries(types).sort((a,b) => b[1]-a[1]).map(([t,c]) => badge(t, c)).join(' ');

    html += `<div class="source-section source-${src}">
      <div class="source-header collapsed" onclick="toggleSource(this)">
        <span class="arrow">▶</span>
        ${dot(src)}
        <span class="source-name">${src}</span>
        <span class="source-meta">${items.length} preds</span>
      </div>
      <div style="padding:6px 16px;font-size:0.75em;border-bottom:1px solid #1a2d3d;color:#667788">
        ${typeSummary}
      </div>
      <div class="source-body hidden">
        <div class="source-table-wrap">
          <table>
            <thead><tr><th>Round</th><th>Slot</th><th>Target</th><th>Type</th><th>Val</th><th>Prec</th><th>Conf</th></tr></thead>
            <tbody>`;
    items.slice(0, 50).forEach(p => {
      html += `<tr>
        ${cell(p.round_id)}
        ${cell(p.slot)}
        ${cell(p.target)}
        ${cell(badge(p.pred_type || '?'))}
        ${cell(p.pred_val)}
        ${cell(pct(p.precision))}
        ${cell(badge(p.confidence))}
      </tr>`;
    });
    if (items.length > 50) html += `<tr><td colspan="7" style="color:#667788;text-align:center">...${items.length - 50} more</td></tr>`;
    html += `</tbody></table></div></div></div>`;
  });
  
  document.getElementById('predictions-container').innerHTML = html || '<div class="empty">No predictions found</div>';
}

// ── Audit ──
async function loadAudit() {
  const summary = await api(API + '/api/audit');
  if (!summary.error) {
    document.getElementById('audit-stats').innerHTML = `
      <div class="card"><h3>Audited</h3><div class="value">${summary.total_audited}</div></div>
      <div class="card"><h3>Correct</h3><div class="value">${summary.total_correct}</div></div>
      <div class="card"><h3>Accuracy</h3><div class="value" style="color:${summary.accuracy_pct >= 60 ? '#00c853' : '#ff6d00'}">${summary.accuracy_pct}%</div></div>`;
    
    let bmHtml = '';
    const order = ['betkraft', 'bongobongo', 'bangbet', 'betpawa'];
    order.forEach(src => {
      const markets = (summary.best_markets_per_source || {})[src] || [];
      if (!markets.length) return;
      bmHtml += `<div class="source-section source-${src}" style="margin-bottom:8px">
        <div class="source-header collapsed" onclick="toggleSource(this)" style="padding:8px 14px">
          <span class="arrow">▶</span> ${dot(src)}
          <span class="source-name">${src}</span>
          <span class="source-meta">${markets.length} markets</span>
        </div>
        <div class="source-body hidden">
          <div class="source-table-wrap">
            <table><thead><tr><th>Market</th><th>Preds</th><th>Correct</th><th>Accuracy</th></tr></thead>
            <tbody>`;
      markets.forEach(m => {
        bmHtml += `<tr><td>${badge(m.market)}</td><td>${m.total}</td><td>${m.correct}</td><td><span style="color:${m.accuracy >= 60 ? '#00c853' : '#ff6d00'}">${m.accuracy}%</span></td></tr>`;
      });
      bmHtml += `</tbody></table></div></div></div>`;
    });
    document.getElementById('audit-best-markets').innerHTML = bmHtml || '<div class="empty">No markets audited yet</div>';
  }

  const slots = await api(API + '/api/audit/slots');
  if (!slots.error) {
    let shtml = '<div class="source-table-wrap"><table><thead><tr><th>Slot</th><th>Checks</th><th>Correct</th><th>Accuracy</th></tr></thead><tbody>';
    (slots || []).forEach(s => {
      shtml += `<tr><td>${s.slot}</td><td>${s.checks}</td><td>${s.correct}</td><td><span style="color:${s.accuracy >= 60 ? '#00c853' : '#ff6d00'}">${s.accuracy}%</span></td></tr>`;
    });
    shtml += '</tbody></table></div>';
    document.getElementById('audit-slots').innerHTML = shtml;
  }

  const log = await api(API + '/api/audit/log');
  if (!log.error) {
    let lhtml = '<div class="source-table-wrap"><table><thead><tr><th>Source</th><th>Round</th><th>Slot</th><th>Target</th><th>Actual</th><th>Status</th></tr></thead><tbody>';
    (log.log || []).slice(0, 30).forEach(l => {
      lhtml += `<tr><td>${l.source}</td><td>${l.round_id}</td><td>${l.slot}</td><td>${l.target}</td><td>${l.actual_val}</td><td>${badge(l.was_correct ? 'correct' : 'wrong')}</td></tr>`;
    });
    lhtml += '</tbody></table></div>';
    document.getElementById('audit-log').innerHTML = lhtml || '<div class="empty">No audit log yet</div>';
  }
}

// ── Sources ──
async function loadSources() {
  const stats = await api(API + '/api/db/stats');
  if (!stats.error) {
    let html = '', total = 0;
    const order = ['betkraft', 'bongobongo', 'bangbet', 'betpawa'];
    order.forEach(src => {
      const cnt = (stats.rounds_per_source || {})[src] || 0;
      total += cnt;
      html += `<div class="card"><h3>${dot(src)} ${src}</h3><div class="value">${cnt}</div><div class="sub">rounds</div></div>`;
    });
    html += `<div class="card"><h3>Total</h3><div class="value">${total}</div><div class="sub">rounds</div></div>`;
    document.getElementById('sources-grid').innerHTML = html;
  }

  const storage = await api(API + '/api/db/storage');
  if (!storage.error) {
    let shtml = '<h2 style="margin-top:16px">Storage</h2><div class="grid">';
    shtml += `<div class="card" style="background:#1a2533"><h3>📦 Database</h3><div class="value">${storage.db_size}</div><div class="sub">total</div></div>`;
    (storage.tables || []).slice(0, 5).forEach(t => {
      shtml += `<div class="card" style="background:#1a2533"><h3>${t.table}</h3><div class="value">${t.size}</div><div class="sub">table</div></div>`;
    });
    shtml += '</div>';
    document.getElementById('sources-storage').innerHTML = shtml;
  }

  const rounds = await api(API + '/api/rounds/recent');
  if (!rounds.error) {
    const grouped = {};
    (rounds.rounds || []).forEach(r => {
      if (!grouped[r.source]) grouped[r.source] = [];
      grouped[r.source].push(r);
    });
    let html = '';
    const order = ['betkraft', 'bongobongo', 'bangbet', 'betpawa'];
    order.forEach(src => {
      const items = grouped[src] || [];
      if (!items.length) return;
      html += `<div class="source-section source-${src}" style="margin-bottom:8px">
        <div class="source-header collapsed" onclick="toggleSource(this)" style="padding:8px 14px">
          <span class="arrow">▶</span> ${dot(src)}
          <span class="source-name">${src}</span>
          <span class="source-meta">${items.length} recent</span>
        </div>
        <div class="source-body hidden">
          <div class="source-table-wrap">
            <table><thead><tr><th>Round ID</th><th>Time</th></tr></thead><tbody>`;
      items.forEach(r => {
        html += `<tr><td>${r.round_id}</td><td>${r.time || '-'}</td></tr>`;
      });
      html += `</tbody></table></div></div></div>`;
    });
    document.getElementById('rounds-by-source').innerHTML = html || '<div class="empty">No rounds yet</div>';
  }
}

// ── Rules ──
async function loadRules() {
  const d = await api(API + '/api/rules/top');
  if (d.error) return;
  const search = (document.getElementById('rules-search').value || '').toLowerCase();
  let list = d.rules || [];
  if (search) list = list.filter(r => (r.target||'').toLowerCase().includes(search));
  document.getElementById('rules-count').textContent = list.length + ' rules';

  const groups = {};
  list.forEach(r => {
    const src = r.source || 'all';
    if (!groups[src]) groups[src] = [];
    groups[src].push(r);
  });

  let html = '';
  Object.entries(groups).forEach(([src, rules]) => {
    html += `<div class="source-section" style="margin-bottom:8px">
      <div class="source-header collapsed" onclick="toggleSource(this)" style="padding:8px 14px">
        <span class="arrow">▶</span>
        <span class="source-name">${src}</span>
        <span class="source-meta">${rules.length} rules</span>
      </div>
      <div class="source-body hidden">
        <div class="source-table-wrap">
          <table><thead><tr><th>Target</th><th>Prec</th><th>EV</th><th>Hits</th><th>Total</th></tr></thead><tbody>`;
    rules.slice(0, 30).forEach(r => {
      html += `<tr>${cell(r.target)}${cell(pct(r.precision))}${cell(r.ev?.toFixed(1))}${cell(r.hits)}${cell(r.total)}</tr>`;
    });
    if (rules.length > 30) html += `<tr><td colspan="5" style="color:#667788;text-align:center">...${rules.length - 30} more</td></tr>`;
    html += `</tbody></table></div></div></div>`;
  });
  document.getElementById('rules-container').innerHTML = html || '<div class="empty">No rules found</div>';
}

// ── Init ──
loadPredictions();
predTimer = setInterval(loadPredictions, 10000);
</script>
</body>
</html>
